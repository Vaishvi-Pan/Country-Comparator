<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Comparer | Compare Global Statistics</title>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Country Comparer</h1>
            <p>Analyze and compare statistics between any two nations</p>
            
            <div id="comparison-summary" class="summary-box">
                <!-- Summary text appears here -->
            </div>

            <div class="action-buttons">
                <button onclick="randomize()" class="btn-secondary">
                    <i data-lucide="shuffle"></i> Random Comparison
                </button>
            </div>
        </header>

        <section class="search-grid">
            <div class="search-card">
                <label for="sel1">Primary Country</label>
                <div class="custom-select-container">
                    <select id="sel1" onchange="showCountry('sel1', 'res1')">
                        <option value="">Select a country...</option>
                    </select>
                </div>
            </div>

            <div class="search-card">
                <label for="sel2">Comparison Country</label>
                <div class="custom-select-container">
                    <select id="sel2" onchange="showCountry('sel2', 'res2')">
                        <option value="">Select a country...</option>
                    </select>
                </div>
            </div>
        </section>

        <main class="results-grid">
            <div id="res1" class="result-container">
                <div class="placeholder-card">
                    <i data-lucide="globe"></i>
                    <p>Choose the first country</p>
                </div>
            </div>

            <div id="res2" class="result-container">
                <div class="placeholder-card">
                    <i data-lucide="globe"></i>
                    <p>Choose the second country</p>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Country Comparer. Data provided by REST Countries API.</p>
        </footer>
    </div>

    <script src="script.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
