<!DOCTYPE html>
<html>
<head>
    <title>Country Search</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }
        .search-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        .search-box {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 16px 20px;
        }
        .search-box h3 {
            margin: 0 0 10px;
            font-size: 15px;
            font-weight: 600;
        }
        select {
            width: 100%;
            padding: 8px 10px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid #ccc;
            background: #fafafa;
        }
        .results-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .result-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 16px 20px;
            min-height: 80px;
        }
        .result-card .placeholder {
            color: #aaa;
            font-size: 14px;
        }
        .result-card img {
            width: 90px;
            border-radius: 4px;
            margin-bottom: 10px;
            display: block;
            border: 1px solid #eee;
        }
        .result-card p {
            margin: 5px 0;
            font-size: 14px;
            color: #222;
            line-height: 1.4;
        }
        .result-card p span {
            color: #888;
            font-size: 13px;
        }
        .country-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px !important;
        }
    </style>
</head>
<body>

    <div class="search-row">
        <div class="search-box">
            <h3>Country 1</h3>
            <select id="sel1" onchange="showCountry('sel1', 'res1')">
                <option value="">Select a country...</option>
            </select>
        </div>
        <div class="search-box">
            <h3>Country 2</h3>
            <select id="sel2" onchange="showCountry('sel2', 'res2')">
                <option value="">Select a country...</option>
            </select>
        </div>
    </div>

    <div class="results-row">
        <div class="result-card" id="res1">
            <p class="placeholder">Select a country above</p>
        </div>
        <div class="result-card" id="res2">
            <p class="placeholder">Select a country above</p>
        </div>
    </div>

<script src="script.js"></script>

</body>
</html>
